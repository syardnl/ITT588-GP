<body class="page-explore">

<!-- Navigation bar -->
  <nav class="navbar navbar-expand-lg custom-navbar shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-rocket text-primary"></i> CareerPilot
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="explore.html">Explore Careers</a></li>
                    <li class="nav-item"><a class="nav-link" href="quiz.html">Skill Quiz</a></li>
                    <li class="nav-item"><a class="nav-link" href="report.html">My Report</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle" title="Toggle Light/Dark Mode">
                            <i class="fas fa-moon" id="theme-icon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


<div class="container py-5">

    <h2 class="mb-4">
        <i class="fas fa-compass"></i>
        Explore Careers
    </h2>



    <!--Filter section-->
    <div class="row mb-4">

        <div class="col-md-4 mb-3">
            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Search career...">
        </div>

        <div class="col-md-4 mb-3">
            <select
                id="clusterFilter"
                class="form-select">

                <option value="">
                    All Clusters
                </option>
            </select>
        </div>

        <div class="col-md-4 mb-3">
            <select
                id="salaryFilter"
                class="form-select">
                <option value="">
                    All Salary
                </option>
                <option value="high">
                    High (RM6k+)
                </option>
                <option value="mid">
                    Mid (RM3k - RM6k)
                </option>
                <option value="entry">
                    Entry (&lt; RM3k)
                </option>
            </select>
        </div>
    </div>

    <button
        id="clearBtn"
        class="btn btn-outline-primary mb-4">
        Clear Filters
    </button>

    <p id="resultCount" class="fw-bold"></p>

    <div class="row" id="careerGrid"></div>

</div>

<div class="modal fade" id="careerModal" tabindex="-1" aria-hidden="true">

    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" id="modalTitle"> Career Details</h4>

                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="modalBody"></div>

            <div class="modal-footer">
                <button class="btn btn-secondary"data-bs-dismiss="modal">Close</button>
            </div>

        </div>

    </div>

</div>
