        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-rocket text-primary"></i> CareerPilot
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

<div class="container py-5">
<div class="row">
  <div class="col-lg-3 mb-4"> 
    <div class="filter-bar sticky-top" style="top:20px">
      <h6 class="fw-bold mb-3"><i class="bi bi-funnel me-2"></i>Filter Careers</h6>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Search</label>
        <input type="text" class="form-control form-control-sm" id="searchinput" placeholder="career title or skills" oninput="filterCareers()" />
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Cluster</label>
        <select class="form-select form-select-sm" id="clusterFilter" onchange="filterCareers()">
          <option value="">All Clusters</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Salary Range</label>
        <select class="form-select form-select-sm" id="salaryfilter" onchange="filterCareers()">
          <option value="">All</option>
            <option value="high">High (RM 6k+)</option>
            <option value="mid">Mid (RM 3–6k)</option>
            <option value="entry">Entry (under RM 3k)</option>
        </select>
      </div>
    <hr />
    <button class="btn btn-outline-dark" onclick="clearFilters()">
      <i class="bi bi-x-circle me-2"></i>Clear Filters</button>
    </div>
  </div>

  <div class="col-lg-9 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h6 class="section-eyebrow">browse</h6>
        <h2 class="section-title">Explore Career Paths</h2>
      </div>
      <span class="badge bf-primary rounded pill fs-6" id="resultCount">0 careers</span>
    </div>

    <div id="careerDetail" class="" data-animate="fade-up"></div>

    <div class="row g-4" id="careerGrid"></div>

    <div id="noResults" class="text-center py-5 d-none">
      <div style="font-size:3rem"></div>
      <h5 class="mt-3">No Careers Found</h5>
      <p class="text-muted">Try adjusting your filters.</p>
    </div>
  </div>




</div>
</div>
